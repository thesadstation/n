<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sad Station - নতুন গান আপলোড</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #050505; 
            --card: #0d0d0d; 
            --logo-gold: #baa184; 
        }
        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
        }
        
        /* সিকিউরিটি চেক কমপ্লিট হওয়ার আগে পুরো ফর্ম হাইড রাখার জন্য */
        .wrapper { 
            max-width: 600px; 
            margin: 30px auto; 
            padding: 25px; 
            background: var(--card); 
            border: 1px solid var(--logo-gold); 
            border-radius: 14px; 
            display: none;
        }
        
        .back-btn { 
            color: var(--logo-gold); 
            text-decoration: none; 
            font-size: 0.9rem; 
            display: inline-block; 
            margin-bottom: 20px; 
            transition: 0.3s; 
        }
        .back-btn:hover { 
            color: #fff; 
        }
        
        h2 { 
            color: var(--logo-gold); 
            margin-top: 0;
            margin-bottom: 25px; 
            text-align: center; 
            font-size: 1.5rem;
        }
        
        .form-group { 
            margin-bottom: 18px; 
        }
        .form-group label { 
            display: block; 
            font-size: 0.85rem; 
            color: #aaa; 
            margin-bottom: 6px; 
        }
        .form-group input, .form-group textarea { 
            width: 100%; 
            padding: 12px; 
            background: #121212; 
            border: 1px solid var(--logo-gold); 
            border-radius: 8px; 
            color: #fff; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s; 
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus { 
            border-color: #fff; 
        }
        
        .btn-submit { 
            width: 100%; 
            padding: 14px; 
            background: transparent; 
            border: 1px solid var(--logo-gold); 
            border-radius: 8px; 
            color: var(--logo-gold); 
            font-size: 1rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn-submit:hover { 
            background: var(--logo-gold); 
            color: #050505; 
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="wrapper" id="song-upload-wrapper">
        <a href="admin.html" class="back-btn"><i class="fas fa-arrow-left"></i> ড্যাশবোর্ডে ফিরে যান</a>
        
        <h2><i class="fas fa-music"></i> নতুন গান আপলোড করুন</h2>
        
        <form id="add-song-form">
            <div class="form-group">
                <label>গানের সিরিয়াল আইডি (ID - শুধুমাত্র সংখ্যা)</label>
                <input type="number" id="song-id" required placeholder="যেমন: 1, 2, 3...">
            </div>
            <div class="form-group">
                <label>গানের শিরোনাম (Song Title)</label>
                <input type="text" id="song-title" required placeholder="গানের নাম লিখুন...">
            </div>
            <div class="form-group">
                <label>থাম্বনেইল ইমেজ ইউআরএল (Thumbnail URL)</label>
                <input type="url" id="song-thumbnail" required placeholder="https://example.com/cover.jpg">
            </div>
            <div class="form-group">
                <label>অডিও ফাইল ইউআরএল (Audio Direct Link)</label>
                <input type="url" id="song-audio" required placeholder="https://files.catbox.moe/song.mp3">
            </div>
            <div class="form-group">
                <label>গানের লিরিক্স (Lyrics)</label>
                <textarea id="song-lyrics" rows="6" placeholder="এখানে সম্পূর্ণ লিরিক্স পেস্ট করুন ভাই..."></textarea>
            </div>
            <button type="submit" class="btn-submit">🚀 গানটি লাইভ করুন</button>
        </form>
    </div>

    <script src="config.js"></script>
    <script src="admin-songs.js"></script>
</body>
</html>
