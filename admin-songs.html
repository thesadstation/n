<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sad Station - নতুন গান আপলোড</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --card: #0d0d0d; --logo-gold: #baa184; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .wrapper { max-width: 600px; margin: 30px auto; padding: 25px; background: var(--card); border: 1px solid var(--logo-gold); border-radius: 14px; display: block; }
        
        /* সিকিউরিটি আপডেট: পেজ লোড হওয়ার সময় কন্টেন্ট হাইড থাকবে */
        #song-upload-wrapper { display: none; }
        
        .back-btn { color: var(--logo-gold); text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 20px; }
        h2 { color: var(--logo-gold); margin-bottom: 25px; text-align: center; font-size: 1.5rem; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid var(--logo-gold); border-radius: 8px; color: #fff; box-sizing: border-box; }
        .upload-area { margin-bottom: 15px; }
        .upload-btn { width: 100%; padding: 12px; background: #1a1a1a; border: 1px dashed var(--logo-gold); color: var(--logo-gold); text-align: center; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .upload-btn:hover { background: var(--logo-gold); color: #050505; }
        .btn-submit { width: 100%; padding: 14px; background: transparent; border: 1px solid var(--logo-gold); border-radius: 8px; color: var(--logo-gold); font-size: 1rem; font-weight: bold; cursor: pointer; }
        .btn-submit:hover { background: var(--logo-gold); color: #050505; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="wrapper" id="song-upload-wrapper">
        <a href="admin.html" class="back-btn"><i class="fas fa-arrow-left"></i> ড্যাশবোর্ডে ফিরে যান</a>
        <h2><i class="fas fa-music"></i> নতুন গান আপলোড করুন</h2>
        
        <form id="add-song-form">
            <div class="form-group">
                <label>গানের সিরিয়াল আইডি (ID)</label>
                <input type="number" id="song-id" required placeholder="যেমন: 1, 2, 3...">
            </div>
            <div class="form-group">
                <label>গানের শিরোনাম</label>
                <input type="text" id="song-title" required placeholder="গানের নাম লিখুন...">
            </div>
            <div class="form-group">
                <label>গানের স্ল্যাগ (URL Slug)</label>
                <input type="text" id="song-slug" required placeholder="যেমন: nishthur-prithibi">
            </div>

            <div class="upload-area">
                <label>থাম্বনেইল ইমেজ</label>
                <div class="upload-btn" onclick="document.getElementById('img-input').click()">📷 ইমেজ আপলোড করুন</div>
                <input type="file" id="img-input" style="display:none" accept="image/*">
                <input type="hidden" id="song-thumbnail" required>
            </div>

            <div class="upload-area">
                <label>অডিও ফাইল</label>
                <div class="upload-btn" onclick="document.getElementById('audio-input').click()">🎵 অডিও ফাইল আপলোড করুন</div>
                <input type="file" id="audio-input" style="display:none" accept="audio/*">
                <input type="hidden" id="song-audio" required>
            </div>

            <div class="form-group">
                <label>গানের লিরিক্স</label>
                <textarea id="song-lyrics" rows="6" placeholder="এখানে লিরিক্স পেস্ট করুন..."></textarea>
            </div>
            <div class="form-group">
                <label>SEO মেটা ডেসক্রিপশন</label>
                <textarea id="song-seo-desc" rows="2" placeholder="এসইও ডেসক্রিপশন..."></textarea>
            </div>
            <button type="submit" class="btn-submit">🚀 গানটি লাইভ করুন</button>
        </form>
    </div>

    <script src="config.js"></script>
    <script src="api-upload.js"></script> <script src="admin-songs.js"></script>
</body>
</html>
