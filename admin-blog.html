<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ব্লগ পাবলিশ - The Sad Station</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>

    <style>
        :root { --bg: #050505; --card: #0d0d0d; --logo-gold: #baa184; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .wrapper { max-width: 700px; margin: 30px auto; padding: 25px; background: var(--card); border: 1px solid var(--logo-gold); border-radius: 14px; }
        h2 { color: var(--logo-gold); text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid var(--logo-gold); border-radius: 8px; color: #fff; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 14px; background: var(--logo-gold); border: none; border-radius: 8px; color: #050505; font-weight: bold; cursor: pointer; }
        .upload-btn { background:#1a1a1a; border:1px dashed var(--logo-gold); color:var(--logo-gold); padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <a href="admin-blog-list.html" style="color:var(--logo-gold); text-decoration:none;"><i class="fas fa-arrow-left"></i> ড্যাশবোর্ডে ফিরে যান</a>
    <h2 id="page-title"><i class="fas fa-pen-nib"></i> নতুন ব্লগ পোস্ট করুন</h2>
    
    <form id="blog-form">
        <div class="form-group">
            <label>সিরিয়াল আইডি</label>
            <input type="number" id="blog-id" required placeholder="101, 102...">
        </div>
        <div class="form-group">
            <label>শিরোনাম</label>
            <input type="text" id="blog-title" required placeholder="ব্লগের শিরোনাম...">
        </div>
        <div class="form-group">
            <label>স্ল্যাগ (URL Slug)</label>
            <input type="text" id="blog-slug" required placeholder="my-awesome-post">
        </div>
        <div class="form-group">
            <label>থাম্বনেইল ইমেজ</label>
            <button type="button" id="upload_widget" class="upload-btn"><i class="fas fa-image"></i> ইমেজ সিলেক্ট ও আপলোড করুন</button>
            <input type="text" id="blog-thumb" required placeholder="আপলোড করার পর লিঙ্ক এখানে অটোমেটিক আসবে...">
        </div>
        <div class="form-group">
            <label>ব্লগ কন্টেন্ট</label>
            <textarea id="blog-content" rows="10" required placeholder="বিস্তারিত লিখুন..."></textarea>
        </div>
        <div class="form-group">
            <label>মেটা ডেসক্রিপশন (SEO)</label>
            <input type="text" id="meta-desc" placeholder="গুগলের জন্য সংক্ষিপ্ত বর্ণনা...">
        </div>
        <div class="form-group">
            <label>মেটা ট্যাগসমূহ</label>
            <input type="text" id="meta-tags" placeholder="sad, music, emotional...">
        </div>
        <button type="submit" id="submit-btn" class="btn-submit">🚀 ব্লগ পাবলিশ করুন</button>
    </form>
</div>

<script src="config.js"></script>
<script src="admin-blog.js"></script>
</body>
</html>
