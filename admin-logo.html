<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sad Station - লোগো সেটিংস</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #050505; 
            --card: #0d0d0d; 
            --logo-gold: #baa184; 
        }
        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
        }
        
        /* সিকিউরিটি চেকের আগে কন্টেন্ট হাইড রাখার জন্য */
        .wrapper { 
            max-width: 500px; 
            margin: 40px auto; 
            padding: 30px; 
            background: var(--card); 
            border: 1px solid var(--logo-gold); 
            border-radius: 14px; 
            display: none; 
        }
        
        .back-btn { 
            color: var(--logo-gold); 
            text-decoration: none; 
            font-size: 0.9rem; 
            display: inline-block; 
            margin-bottom: 25px; 
            transition: 0.3s; 
        }
        .back-btn:hover { 
            color: #fff; 
        }
        
        h2 { 
            color: var(--logo-gold); 
            margin-top: 0;
            margin-bottom: 25px; 
            text-align: center; 
            font-size: 1.5rem;
        }
        
        .form-group { 
            margin-bottom: 20px; 
        }
        .form-group label { 
            display: block; 
            font-size: 0.85rem; 
            color: #aaa; 
            margin-bottom: 8px; 
        }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            background: #121212; 
            border: 1px solid var(--logo-gold); 
            border-radius: 8px; 
            color: #fff; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s; 
        }
        .form-group input:focus { 
            border-color: #fff; 
        }
        
        .btn-submit { 
            width: 100%; 
            padding: 14px; 
            background: transparent; 
            border: 1px solid var(--logo-gold); 
            border-radius: 8px; 
            color: var(--logo-gold); 
            font-size: 1rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px;
        }
        .btn-submit:hover { 
            background: var(--logo-gold); 
            color: #050505; 
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="wrapper" id="logo-settings-wrapper">
        <a href="admin.html" class="back-btn"><i class="fas fa-arrow-left"></i> ড্যাশবোর্ডে ফিরে যান</a>
        
        <h2><i class="fas fa-sliders-h"></i> লোগো ও ব্যানার সেটিংস</h2>
        
        <form id="branding-form">
            <div class="form-group">
                <label>লোগো ইউআরএল (Logo URL)</label>
                <input type="url" id="branding-logo" placeholder="https://example.com/logo.png" required>
            </div>
            <div class="form-group">
                <label>ব্যানার ইউআরএল (Banner URL)</label>
                <input type="url" id="branding-banner" placeholder="https://example.com/banner.jpg" required>
            </div>
            <button type="submit" class="btn-submit">💾 সেটিংস সেভ করুন</button>
        </form>
    </div>

    <script src="config.js"></script>
    <script src="admin-logo.js"></script>
</body>
</html>
