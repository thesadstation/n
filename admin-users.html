<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইউজার ম্যানেজমেন্ট | The Sad Station</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --card: #0d0d0d; --logo-gold: #baa184; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* সার্চ বার */
        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; background: var(--card); border: 1px solid var(--logo-gold); color: #fff; border-radius: 8px; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); }
        th, td { padding: 15px; border-bottom: 1px solid #222; text-align: left; }
        .user-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        .ban-btn { padding: 6px 12px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
        .btn-active { background: #1db954; color: #fff; }
        .btn-banned { background: #dc3545; color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <a href="admin.html" style="color:var(--logo-gold);"><i class="fas fa-arrow-left"></i> ড্যাশবোর্ড</a>
        <h2>ইউজার ম্যানেজমেন্ট</h2>
        
        <input type="text" id="user-search" class="search-box" placeholder="নাম বা ইমেইল দিয়ে সার্চ করুন...">

        <table>
            <thead>
                <tr>
                    <th>ছবি</th>
                    <th>নাম</th>
                    <th>ইমেইল</th>
                    <th>অ্যাকশন</th>
                </tr>
            </thead>
            <tbody id="users-body">
                </tbody>
        </table>
    </div>

    <script src="config.js"></script>
    <script>
        const db = window.db;
        const usersBody = document.getElementById('users-body');
        const searchInput = document.getElementById('user-search');
        let allUsers = [];

        // ইউজার ডাটা লোড
        db.collection("users").get().then((snapshot) => {
            snapshot.forEach((doc) => {
                const user = { id: doc.id, ...doc.data() };
                allUsers.push(user);
            });
            renderUsers(allUsers);
        });

        // টেবিল রেন্ডার
        function renderUsers(users) {
            usersBody.innerHTML = '';
            users.forEach(user => {
                const status = user.status === 'banned' ? 'banned' : 'active';
                const row = `<tr>
                    <td><img src="${user.photoURL || 'default-avatar.png'}" class="user-img"></td>
                    <td>${user.displayName || 'নাম নেই'}</td>
                    <td>${user.email || 'ইমেইল নেই'}</td>
                    <td>
                        <button class="ban-btn ${status === 'active' ? 'btn-active' : 'btn-banned'}" 
                                onclick="toggleBan('${user.id}', '${status}')">
                            ${status === 'active' ? 'অ্যাক্টিভ' : 'ব্যানড'}
                        </button>
                    </td>
                </tr>`;
                usersBody.innerHTML += row;
            });
        }

        // সার্চ লজিক
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allUsers.filter(u => 
                (u.displayName && u.displayName.toLowerCase().includes(term)) || 
                (u.email && u.email.toLowerCase().includes(term))
            );
            renderUsers(filtered);
        });

        // ব্যান লজিক
        window.toggleBan = (uid, currentStatus) => {
            const newStatus = currentStatus === 'active' ? 'banned' : 'active';
            db.collection("users").doc(uid).update({ status: newStatus }).then(() => {
                alert("ইউজার স্ট্যাটাস আপডেট হয়েছে ভাই!");
                location.reload();
            });
        };
    </script>
</body>
</html>
