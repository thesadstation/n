<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পছন্দের গান | The Sad Station</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script src="config.js"></script>
</head>
<body>

    <header>
        <div class="container">
            <div class="header-left">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: white;">
                    <img id="site-logo" src="" alt="Logo" class="site-logo" style="display: none; width: 40px; margin-right: 10px;">
                    <h1 class="site-title">The Sad Station</h1>
                </a>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: 30px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="index.html" class="download-btn" style="text-decoration: none; padding: 10px 20px; display: inline-block; border: 1px solid #baa184; border-radius: 8px; color: #baa184;">🏠 হোম পেজে ফিরে যান</a>
        </div>

        <h2 style="color: #baa184; text-align: center; margin-bottom: 30px;">❤️ আমার পছন্দের গানসমূহ</h2>
        <div id="loader" class="loader">গান লোড হচ্ছে...</div>
        <div id="wishlist-list" class="song-list"></div>
    </main>

    <script>
        const db = window.db;
        const auth = window.auth;

        // ব্র্যান্ডিং লোগো লোড
        db.collection("site_branding").doc("site_branding").get().then(doc => {
            if (doc.exists && doc.data().logo_url) {
                const logoImg = document.getElementById('site-logo');
                logoImg.src = doc.data().logo_url;
                logoImg.style.display = 'block';
            }
        });

        // পছন্দের গান রেন্ডার
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = "login.html"; return; }

            const listDiv = document.getElementById('wishlist-list');
            const loader = document.getElementById('loader');
            
            try {
                const favSnap = await db.collection("user_favorites").where("user_id", "==", user.uid).get();
                
                if (favSnap.empty) {
                    loader.style.display = 'none';
                    listDiv.innerHTML = "<p style='text-align:center; color:#888;'>আপনার পছন্দের তালিকায় কোনো গান নেই!</p>";
                    return;
                }

                const songSnap = await db.collection("songs").get();
                
                loader.style.display = 'none';
                
                favSnap.forEach(doc => {
                    const favData = doc.data();
                    const song = songSnap.docs.find(d => String(d.data().id) === String(favData.song_id));
                    
                    if (song) {
                        const songData = song.data();
                        const playUrl = `index.html?play=${songData.id}`;
                        
                        const card = document.createElement('div');
                        card.className = 'song-card';
                        card.innerHTML = `
                            <div class="song-header-meta">
                                <img class="song-thumb" src="${songData.thumbnail_url}" alt="${songData.title}">
                                <div class="song-info-block">
                                    <h3 class="song-title">${songData.title}</h3>
                                    <a href="${playUrl}" class="play-song-btn" style="
                                        display: inline-block; 
                                        margin-top: 8px; 
                                        padding: 6px 15px; 
                                        background: #baa184; 
                                        color: #000; 
                                        text-decoration: none; 
                                        border-radius: 20px; 
                                        font-size: 0.8rem; 
                                        font-weight: bold;
                                        transition: 0.3s;">
                                        <i class="fas fa-play-circle"></i> প্লে করুন
                                    </a>
                                </div>
                                <button class="delete-btn" onclick="removeFromWishlist('${doc.id}')" style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-size: 1.2rem;">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        `;
                        listDiv.appendChild(card);
                    }
                });
            } catch (error) {
                console.error("এরর:", error);
                loader.innerText = "ডাটা লোড হতে সমস্যা হচ্ছে।";
            }
        });

        // ডিলিট ফাংশন
        window.removeFromWishlist = async (docId) => {
            if (confirm("পছন্দের তালিকা থেকে সরাতে চান?")) {
                try {
                    await db.collection("user_favorites").doc(docId).delete();
                    window.location.reload();
                } catch (err) {
                    alert("ডিলিট করতে সমস্যা হয়েছে!");
                }
            }
        };
    </script>
</body>
</html>
